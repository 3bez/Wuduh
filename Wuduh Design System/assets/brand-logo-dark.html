<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-inverse);font-family:var(--font-sans);
       display:flex;align-items:center;justify-content:center;height:320px}
  .lockup{display:flex;align-items:center;gap:18px}
  .mark{width:64px;height:64px;flex:none}

        font-size:46px;color:var(--text-on-dark);letter-spacing:var(--tracking-snug);line-height:1}
  .sub{font-family:var(--font-sans);font-weight:var(--fw-regular);font-size:13px;
       letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--gold-400);
       margin-top:7px}
</style></head>
<body>
  <div class="lockup">
    <svg class="mark" viewBox="0 0 96 96" fill="none"><path d="M40 79 L40 51 Q40 37 48 32 Q56 37 56 51 L56 79 Z" fill="#C9A84C"/><path d="M27 81 L27 44 Q27 21 48 15 Q69 21 69 44 L69 81" stroke="#AEC6D9" stroke-width="7.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/></svg>
    <div>
      <div class="word">Wuduh</div>
      <div class="sub">Your threshold to investors</div>
    </div>
  </div>
</body></html>

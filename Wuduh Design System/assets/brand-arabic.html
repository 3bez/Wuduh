<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-card);font-family:var(--font-arabic);
       display:flex;align-items:center;justify-content:center;height:300px;gap:56px}
  .block{display:flex;flex-direction:column;align-items:center;gap:14px}
  .mark{width:58px;height:58px}
  .ar{font-family:var(--font-arabic);font-weight:var(--fw-semibold);font-size:62px;
      color:var(--text-strong);line-height:1}
  .en{font-family:var(--font-display);font-weight:var(--fw-medium);font-size:42px;
      color:var(--text-strong);letter-spacing:var(--tracking-snug);line-height:1}
  .cap{font-family:var(--font-mono);font-size:11px;letter-spacing:var(--tracking-caps);
       text-transform:uppercase;color:var(--text-subtle)}
  .div{width:1px;height:120px;background:var(--border)}
</style></head>
<body>
  <div class="block">
    <svg class="mark" viewBox="0 0 96 96" fill="none"><path d="M40 79 L40 51 Q40 37 48 32 Q56 37 56 51 L56 79 Z" fill="#C9A84C"/><path d="M27 81 L27 44 Q27 21 48 15 Q69 21 69 44 L69 81" stroke="#0D1B2A" stroke-width="7.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/></svg>
    <div class="ar">وضوح</div>
    <div class="cap">Arabic primary</div>
  </div>
  <div class="div"></div>
  <div class="block">
    <svg class="mark" viewBox="0 0 96 96" fill="none"><path d="M40 79 L40 51 Q40 37 48 32 Q56 37 56 51 L56 79 Z" fill="#C9A84C"/><path d="M27 81 L27 44 Q27 21 48 15 Q69 21 69 44 L69 81" stroke="#0D1B2A" stroke-width="7.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/></svg>
    <div class="en">Wuduh</div>
    <div class="cap">Latin primary</div>
  </div>
</body></html>

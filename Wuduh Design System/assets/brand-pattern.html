<!-- @dsCard group="Brand" viewport="700x260" name="Geometric motif" subtitle="Octagon-and-star net for surfaces, exports & marketing" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{display:flex;height:260px;font-family:var(--font-sans)}
  .panel{flex:1;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:18px}
  .navy{background:var(--surface-inverse)}
  .paper{background:var(--surface-paper)}
  .net{position:absolute;inset:0}
  .lbl{position:relative;font-family:var(--font-mono);font-size:11px;letter-spacing:var(--tracking-caps);
       text-transform:uppercase}
  .navy .lbl{color:var(--gold-400)}
  .paper .lbl{color:var(--text-muted)}
</style></head>
<body>
  <div class="panel navy">
    <svg class="net" width="100%" height="100%"><defs>
      <pattern id="n1" width="64" height="64" patternUnits="userSpaceOnUse">
        <g fill="none" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.45">
          <rect x="16" y="16" width="32" height="32"/>
          <rect x="22.6" y="22.6" width="32" height="32" transform="rotate(45 32 32)" stroke-opacity="0.28"/>
          <path d="M32 0 L32 16 M32 48 L32 64 M0 32 L16 32 M48 32 L64 32" stroke-opacity="0.3"/>
        </g>
      </pattern></defs><rect width="100%" height="100%" fill="url(#n1)"/></svg>
    <span class="lbl">On navy</span>
  </div>
  <div class="panel paper">
    <svg class="net" width="100%" height="100%"><defs>
      <pattern id="n2" width="64" height="64" patternUnits="userSpaceOnUse">
        <g fill="none" stroke="#0D1B2A" stroke-width="1" stroke-opacity="0.22">
          <rect x="16" y="16" width="32" height="32"/>
          <rect x="22.6" y="22.6" width="32" height="32" transform="rotate(45 32 32)" stroke-opacity="0.14"/>
          <path d="M32 0 L32 16 M32 48 L32 64 M0 32 L16 32 M48 32 L64 32" stroke-opacity="0.16"/>
        </g>
      </pattern></defs><rect width="100%" height="100%" fill="url(#n2)"/></svg>
    <span class="lbl">On paper</span>
  </div>
</body></html>

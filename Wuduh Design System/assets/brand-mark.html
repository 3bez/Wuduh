<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>

       text-transform:uppercase;color:var(--text-subtle)}

  <div class="row">

    <div class="item"><div class="chip"><svg width="56" height="56" viewBox="0 0 96 96" fill="none"><path d="M40 79 L40 51 Q40 37 48 32 Q56 37 56 51 L56 79 Z" fill="#C9A84C"/><path d="M27 81 L27 44 Q27 21 48 15 Q69 21 69 44 L69 81" stroke="#AEC6D9" stroke-width="7.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/></svg></div><span class="cap">App icon</span></div>
  </div>

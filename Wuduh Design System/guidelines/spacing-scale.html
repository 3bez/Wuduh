<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-mono);background:var(--surface-card);padding:22px 24px}
  .row{display:flex;align-items:flex-end;gap:14px}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--navy-700);border-radius:3px;width:26px}
  .t{font-size:10px;color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="t">1·4</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="t">2·8</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><span class="t">3·12</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="t">4·16</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="t">6·24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="t">8·32</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="t">12·48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="t">16·64</span></div>
    <div class="item"><div class="bar" style="height:80px"></div><span class="t">20·80</span></div>
  </div>
</body></html>

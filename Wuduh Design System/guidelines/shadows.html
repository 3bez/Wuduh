<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation" subtitle="Navy-tinted, soft, low spread. Trust, not flash." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-mono);background:var(--surface-canvas);padding:30px 26px;display:flex;gap:30px;align-items:center}
  .item{display:flex;flex-direction:column;align-items:center;gap:14px}
  .box{width:96px;height:64px;background:var(--surface-card);border-radius:var(--radius-md)}
  .t{font-size:10px;color:var(--text-muted)}
</style></head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="t">xs</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="t">sm</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="t">md</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="t">lg</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="t">xl</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-gold)"></div><span class="t">gold</span></div>
</body></html>

<!-- @dsCard group="Type" viewport="700x250" name="Type scale" subtitle="11 → 84px. Display sizes in serif, text in sans." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-card);padding:18px 24px;color:var(--text-strong)}
  .r{display:flex;align-items:baseline;gap:18px;padding:3px 0;border-bottom:1px solid var(--slate-50)}
  .tok{font-family:var(--font-mono);font-size:10.5px;color:var(--text-subtle);width:120px;flex:none}
  .ex{font-family:var(--font-display);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head>
<body>
  <div class="r"><span class="tok">6xl · 84</span><span class="ex" style="font-size:42px">Aa وض</span></div>
  <div class="r"><span class="tok">4xl · 52</span><span class="ex" style="font-size:36px">Clarity, defined</span></div>
  <div class="r"><span class="tok">2xl · 32</span><span class="ex" style="font-size:28px">Section heading</span></div>
  <div class="r"><span class="tok">xl · 26</span><span class="ex" style="font-size:24px">Card question title</span></div>
  <div class="r"><span class="tok">lg · 21</span><span class="ex" style="font-size:20px;font-family:var(--font-sans)">Lead paragraph</span></div>
  <div class="r"><span class="tok">base · 16</span><span class="ex" style="font-size:16px;font-family:var(--font-sans)">Body copy and interface text</span></div>
  <div class="r"><span class="tok">sm · 14 / xs · 12</span><span class="ex" style="font-size:13px;font-family:var(--font-sans);color:var(--text-muted)">Helper text and captions</span></div>
</body></html>

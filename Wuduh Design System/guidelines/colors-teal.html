<!-- @dsCard group="Colors" viewport="700x170" name="Teal — supporting" subtitle="Progress, completion, the affirming second voice." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-mono);background:var(--surface-card);padding:18px 20px}
  .ramp{display:flex;gap:6px}
  .sw{flex:1;display:flex;flex-direction:column;gap:7px}
  .chip{height:84px;border-radius:var(--radius-sm);border:1px solid rgba(13,27,42,.06)}
  .t{font-size:10px;color:var(--text-strong)}
  .h{font-size:9.5px;color:var(--text-subtle)}
  b{display:block;font-family:var(--font-sans);font-size:11px;letter-spacing:var(--tracking-caps);
    text-transform:uppercase;color:var(--text-muted);margin:0 0 14px}
</style></head>
<body>
  <b>Teal · support base #0D9488</b>
  <div class="ramp">
    <div class="sw"><div class="chip" style="background:var(--teal-700)"></div><span class="t">700</span><span class="h">0A6E66</span></div>
    <div class="sw"><div class="chip" style="background:var(--teal-600)"></div><span class="t">600</span><span class="h">0B8077</span></div>
    <div class="sw"><div class="chip" style="background:var(--teal-500)"></div><span class="t">500</span><span class="h">0D9488</span></div>
    <div class="sw"><div class="chip" style="background:var(--teal-400)"></div><span class="t">400</span><span class="h">2EB3A6</span></div>
    <div class="sw"><div class="chip" style="background:var(--teal-300)"></div><span class="t">300</span><span class="h">6FCCC2</span></div>
    <div class="sw"><div class="chip" style="background:var(--teal-200)"></div><span class="t">200</span><span class="h">A9E0D9</span></div>
    <div class="sw"><div class="chip" style="background:var(--teal-100)"></div><span class="t">100</span><span class="h">D8F1EE</span></div>
  </div>
</body></html>

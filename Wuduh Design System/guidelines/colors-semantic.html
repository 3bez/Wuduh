<!-- @dsCard group="Colors" viewport="700x180" name="Semantic status" subtitle="Warm-fit success, warning, danger, info." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--surface-card);padding:18px 20px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .item{display:flex;flex-direction:column;gap:8px}
  .pair{display:flex;gap:6px}
  .chip{height:54px;flex:1;border-radius:var(--radius-sm)}
  .soft{flex:none;width:34px}
  .name{font-size:12px;font-weight:600;color:var(--text-strong)}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle)}
  b{display:block;font-size:11px;letter-spacing:var(--tracking-caps);
    text-transform:uppercase;color:var(--text-muted);margin:0 0 14px}
</style></head>
<body>
  <b>Status colors · 500 + soft tint</b>
  <div class="grid">
    <div class="item"><div class="pair"><div class="chip" style="background:var(--success-500)"></div><div class="chip soft" style="background:var(--success-100)"></div></div><span class="name">Success</span><span class="hex">15805A</span></div>
    <div class="item"><div class="pair"><div class="chip" style="background:var(--warning-500)"></div><div class="chip soft" style="background:var(--warning-100)"></div></div><span class="name">Warning</span><span class="hex">D99A2B</span></div>
    <div class="item"><div class="pair"><div class="chip" style="background:var(--danger-500)"></div><div class="chip soft" style="background:var(--danger-100)"></div></div><span class="name">Danger</span><span class="hex">C0492F</span></div>
    <div class="item"><div class="pair"><div class="chip" style="background:var(--info-500)"></div><div class="chip soft" style="background:var(--info-100)"></div></div><span class="name">Info</span><span class="hex">305F86</span></div>
  </div>
</body></html>

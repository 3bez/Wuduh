<!-- @dsCard group="Colors" viewport="700x170" name="Gold — accent" subtitle="Used sparingly: the moment of clarity, never a fill." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-mono);background:var(--surface-card);padding:18px 20px}
  .ramp{display:flex;gap:6px}
  .sw{flex:1;display:flex;flex-direction:column;gap:7px}
  .chip{height:84px;border-radius:var(--radius-sm);border:1px solid rgba(13,27,42,.06)}
  .t{font-size:10px;color:var(--text-strong)}
  .h{font-size:9.5px;color:var(--text-subtle)}
  b{display:block;font-family:var(--font-sans);font-size:11px;letter-spacing:var(--tracking-caps);
    text-transform:uppercase;color:var(--text-muted);margin:0 0 14px}
</style></head>
<body>
  <b>Gold · accent base #C9A84C</b>
  <div class="ramp">
    <div class="sw"><div class="chip" style="background:var(--gold-700)"></div><span class="t">700</span><span class="h">8A6F26</span></div>
    <div class="sw"><div class="chip" style="background:var(--gold-600)"></div><span class="t">600</span><span class="h">A6852F</span></div>
    <div class="sw"><div class="chip" style="background:var(--gold-500)"></div><span class="t">500</span><span class="h">C9A84C</span></div>
    <div class="sw"><div class="chip" style="background:var(--gold-400)"></div><span class="t">400</span><span class="h">D6BC72</span></div>
    <div class="sw"><div class="chip" style="background:var(--gold-300)"></div><span class="t">300</span><span class="h">E3CF9A</span></div>
    <div class="sw"><div class="chip" style="background:var(--gold-200)"></div><span class="t">200</span><span class="h">EEE0BF</span></div>
    <div class="sw"><div class="chip" style="background:var(--gold-100)"></div><span class="t">100</span><span class="h">F6EEDB</span></div>
  </div>
</body></html>

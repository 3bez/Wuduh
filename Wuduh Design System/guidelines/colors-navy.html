<!-- @dsCard group="Colors" viewport="700x170" name="Navy — dominant" subtitle="The foundation. Depth, trust, the primary canvas." -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-mono);background:var(--surface-card);padding:18px 20px}
  .ramp{display:flex;gap:6px}
  .sw{flex:1;display:flex;flex-direction:column;gap:7px}
  .chip{height:84px;border-radius:var(--radius-sm);border:1px solid rgba(13,27,42,.06)}
  .t{font-size:10px;color:var(--text-strong);letter-spacing:.02em}
  .h{font-size:9.5px;color:var(--text-subtle)}
  b{display:block;font-family:var(--font-sans);font-size:11px;letter-spacing:var(--tracking-caps);
    text-transform:uppercase;color:var(--text-muted);margin:0 0 14px}
</style></head>
<body>
  <b>Navy · brand base #0D1B2A</b>
  <div class="ramp">
    <div class="sw"><div class="chip" style="background:var(--navy-900)"></div><span class="t">900</span><span class="h">0D1B2A</span></div>
    <div class="sw"><div class="chip" style="background:var(--navy-800)"></div><span class="t">800</span><span class="h">132A40</span></div>
    <div class="sw"><div class="chip" style="background:var(--navy-700)"></div><span class="t">700</span><span class="h">1B3A56</span></div>
    <div class="sw"><div class="chip" style="background:var(--navy-600)"></div><span class="t">600</span><span class="h">244C6E</span></div>
    <div class="sw"><div class="chip" style="background:var(--navy-500)"></div><span class="t">500</span><span class="h">305F86</span></div>
    <div class="sw"><div class="chip" style="background:var(--navy-400)"></div><span class="t">400</span><span class="h">4D7CA3</span></div>
    <div class="sw"><div class="chip" style="background:var(--navy-300)"></div><span class="t">300</span><span class="h">7BA0BF</span></div>
    <div class="sw"><div class="chip" style="background:var(--navy-200)"></div><span class="t">200</span><span class="h">AEC6D9</span></div>
    <div class="sw"><div class="chip" style="background:var(--navy-100)"></div><span class="t">100</span><span class="h">D7E3EC</span></div>
    <div class="sw"><div class="chip" style="background:var(--navy-50)"></div><span class="t">50</span><span class="h">EEF3F7</span></div>
  </div>
</body></html>

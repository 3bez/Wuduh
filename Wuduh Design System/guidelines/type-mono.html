<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-mono);background:var(--surface-card);padding:22px 24px;color:var(--text-strong)}
  .eyebrow{font-size:11px;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent)}
  .row{display:flex;gap:28px;align-items:baseline;margin-top:14px}
  .big{font-size:34px;font-weight:600;letter-spacing:.02em}
  .lbl{font-size:13px;color:var(--text-muted)}
</style></head>
<body>
  <div class="eyebrow">Market · Question 04</div>
  <div class="row">
    <span class="big">04 / 12</span>
    <span class="lbl">SAR 1,250,000</span>
    <span class="lbl">TAM · 33%</span>
  </div>
</body></html>

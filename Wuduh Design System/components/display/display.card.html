<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-canvas);font-family:var(--font-sans);padding:26px}
  .grid{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;align-items:start}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Card, Badge, Avatar } = window.WuduhDesignSystem_971755;
function Demo(){
  return (
    <div className="grid">
      <Card eyebrow="Market · Question 4" title="Who is your first customer?" accentTop>
        Be specific — one clear segment beats three vague ones, and we'll size it together next.
      </Card>
      <div>
        <div className="row">
          <Badge tone="teal" dot>In progress</Badge>
          <Badge tone="gold">Investor-ready</Badge>
          <Badge tone="success">Complete</Badge>
          <Badge tone="warning">Needs detail</Badge>
        </div>
        <div className="row">
          <Badge tone="navy">Market</Badge>
          <Badge tone="neutral">Draft</Badge>
          <Badge tone="solid">12 cards</Badge>
        </div>
        <div className="row" style={{marginTop:6}}>
          <Avatar name="Layla Al-Saud" />
          <Avatar name="Omar K" tone="gold" />
          <Avatar name="Noura M" tone="teal" size="lg" />
          <Avatar name="Fahad" square />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>

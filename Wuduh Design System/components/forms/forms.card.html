<!-- @dsCard group="Components" viewport="700x340" name="Form fields" subtitle="Input, textarea with counter, checkbox & radio-style" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-card);font-family:var(--font-sans);padding:26px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:start}
  .stack{display:flex;flex-direction:column;gap:14px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Textarea, Checkbox } = window.WuduhDesignSystem_971755;
const Mail = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>;
function Demo(){
  const [v,setV] = React.useState("We help Riyadh cafés cut waste");
  return (
    <div className="grid">
      <div className="stack">
        <Input label="Venture name" required placeholder="e.g. Saffa" defaultValue="Saffa" />
        <Input label="Work email" iconStart={<Mail/>} placeholder="you@company.com" />
        <Input label="Website" error="Enter a valid URL" defaultValue="notaurl" />
      </div>
      <div className="stack">
        <Textarea label="Describe your customer" value={v} onChange={e=>setV(e.target.value)} maxLength={160}
          helpText="One clear segment beats three vague ones." />
        <Checkbox round name="stage" label="Pre-revenue" defaultChecked />
        <Checkbox round name="stage" label="Generating revenue" />
        <Checkbox label="Email me my study as a PDF" defaultChecked />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
